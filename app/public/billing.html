<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Billing — H-vard Farm</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand"><img src="/assets/logo.svg" alt="" width="32" height="32" /> H-vard Farm</a>
      <ul class="sidebar__nav">
        <li><a href="/dashboard.html">Overview</a></li>
        <li><a href="/billing.html" class="active">Billing</a></li>
        <li><a href="/settings.html">Settings</a></li>
      </ul>
    </aside>
    <div class="app-main">
      <header class="topbar"><h1 style="font-size:1.125rem">Billing</h1></header>
      <div class="content">
        <div class="card-grid card-grid--3" style="margin-bottom:var(--space-3)">
          <div class="card stat-card">
            <div class="stat-card__label">Current balance</div>
            <div class="stat-card__value" id="balance">—</div>
          </div>
          <div class="card stat-card">
            <div class="stat-card__label">Plan</div>
            <div class="stat-card__value" id="plan" style="font-size:1.25rem;text-transform:capitalize">—</div>
          </div>
          <div class="card stat-card">
            <div class="stat-card__label">PayPal</div>
            <div class="stat-card__value" id="paypal-status" style="font-size:1rem">—</div>
          </div>
        </div>

        <section class="card" style="margin-bottom:var(--space-3)">
          <h2 style="margin-bottom:var(--space-2)">Top up balance</h2>
          <p style="color:var(--text-muted);margin-bottom:var(--space-2);font-size:0.9375rem">Add funds via PayPal. Syncs to ZENTRO-OWN-API when configured.</p>
          <div style="display:flex;gap:var(--space-1);flex-wrap:wrap;align-items:flex-end">
            <div class="form-group" style="margin:0;flex:1;min-width:140px">
              <label for="amount">Amount (NOK)</label>
              <input type="number" id="amount" class="form-control" min="50" step="50" value="500" />
            </div>
            <button type="button" class="btn btn-primary" id="topup-btn">Pay with PayPal</button>
          </div>
        </section>

        <section class="card">
          <h2 style="margin-bottom:var(--space-2)">Transaction history</h2>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Date</th><th>Type</th><th>Amount</th><th>Status</th></tr></thead>
              <tbody id="tx-body"><tr><td colspan="4">Loading…</td></tr></tbody>
            </table>
          </div>
        </section>
      </div>
    </div>
  </div>
  <script src="/js/app.js"></script>
  <script src="/js/billing.js"></script>
</body>
</html>
