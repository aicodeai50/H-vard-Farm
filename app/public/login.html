<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — H-vard Farm</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="container" style="max-width:400px;padding:var(--space-8) var(--space-2)">
    <div style="text-align:center;margin-bottom:var(--space-4)">
      <img src="/assets/logo.svg" alt="" width="48" height="48" style="margin-bottom:var(--space-2)" />
      <h1>Welcome back</h1>
      <p style="color:var(--text-muted)">Sign in to your farm dashboard</p>
    </div>
    <form id="login-form" class="card">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" class="form-control" required placeholder="you@farm.no" value="demo@hvard.farm" />
      </div>
      <div class="form-group">
        <label for="name">Display name</label>
        <input type="text" id="name" class="form-control" placeholder="Your name" value="Demo Farmer" />
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Continue to dashboard</button>
    </form>
    <p style="text-align:center;margin-top:var(--space-2);font-size:0.875rem;color:var(--text-muted)">
      <a href="/">← Back to home</a>
    </p>
  </div>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      try {
        await App.api("/api/auth/login", {
          method: "POST",
          body: JSON.stringify({
            email: document.getElementById("email").value,
            name: document.getElementById("name").value,
          }),
        });
        window.location.href = "/dashboard.html";
      } catch (err) {
        App.toast(err.message);
      }
    });
  </script>
</body>
</html>
