<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — H-vard Farm</title>
  <link rel="icon" href="/assets/logo.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <a href="/" class="brand"><img src="/assets/logo.svg" alt="" width="32" height="32" /> H-vard Farm</a>
      <ul class="sidebar__nav">
        <li><a href="/dashboard.html" class="active">Overview</a></li>
        <li><a href="/dashboard.html#fields">Fields</a></li>
        <li><a href="/dashboard.html#weather">Weather</a></li>
        <li><a href="/dashboard.html#activity">Activity</a></li>
        <li><a href="/billing.html">Billing</a></li>
        <li><a href="/settings.html">Settings</a></li>
      </ul>
      <button type="button" class="btn btn-ghost btn-sm" id="logout-btn">Log out</button>
    </aside>
    <div class="app-main">
      <header class="topbar">
        <h1 style="font-size:1.125rem">Farm overview</h1>
        <div style="display:flex;align-items:center;gap:var(--space-2)">
          <button type="button" class="theme-toggle" data-theme-toggle>◐</button>
          <span class="topbar__user" id="user-label">—</span>
        </div>
      </header>
      <div class="content">
        <div class="card-grid card-grid--4" id="stats" style="margin-bottom:var(--space-3)"></div>

        <section id="fields" style="margin-bottom:var(--space-4)">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
            <h2>Fields & crops</h2>
            <button type="button" class="btn btn-primary btn-sm" id="add-field-btn">Add field</button>
          </div>
          <div class="card-grid card-grid--3" id="fields-grid"></div>
        </section>

        <section id="harvest" style="margin-bottom:var(--space-4)">
          <h2 style="margin-bottom:var(--space-2)">Harvest planning</h2>
          <div class="card-grid card-grid--3" id="harvest-grid"></div>
        </section>

        <div class="dashboard-split">
          <section class="card" id="weather">
            <h2 style="margin-bottom:var(--space-2)">Weather</h2>
            <div id="weather-panel">Loading…</div>
          </section>
          <section class="card" id="activity">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:var(--space-2)">
              <h2>Recent activity</h2>
              <button type="button" class="btn btn-outline btn-sm" id="log-activity-btn">Log activity</button>
            </div>
            <div id="activity-list">Loading…</div>
          </section>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-backdrop" id="activity-modal">
    <div class="modal">
      <h3 style="margin-bottom:var(--space-2)">Log activity</h3>
      <form id="activity-form">
        <div class="form-group">
          <label>Type</label>
          <select class="form-control" name="type" required>
            <option value="seeding">Seeding</option>
            <option value="fertilizing">Fertilizing</option>
            <option value="inspection">Inspection</option>
            <option value="harvest">Harvest</option>
            <option value="note">Note</option>
          </select>
        </div>
        <div class="form-group"><label>Field (optional)</label><select class="form-control" name="field_id" id="activity-field-select"></select></div>
        <div class="form-group"><label>Description</label><textarea class="form-control" name="description" rows="3"></textarea></div>
        <div class="modal__actions">
          <button type="button" class="btn btn-ghost" id="activity-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal-backdrop" id="field-modal">
    <div class="modal">
      <h3 style="margin-bottom:var(--space-2)">Add field</h3>
      <form id="field-form">
        <div class="form-group"><label>Name</label><input class="form-control" name="name" required /></div>
        <div class="form-group"><label>Area (ha)</label><input class="form-control" name="area_ha" type="number" step="0.1" required /></div>
        <div class="form-group"><label>Crop</label><input class="form-control" name="crop" /></div>
        <div class="form-group"><label>Planted</label><input class="form-control" name="planted_at" type="date" /></div>
        <div class="form-group"><label>Harvest target</label><input class="form-control" name="harvest_at" type="date" /></div>
        <div class="modal__actions">
          <button type="button" class="btn btn-ghost" id="modal-cancel">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
