    <polygon points="820,500 920,560 720,560"/>
    <rect x="1180" y="590" width="140" height="65" rx="2"/>
    <polygon points="1250,555 1320,590 1180,590"/>
  </g>
  <!-- Foreground field texture -->
  <g opacity="0.08" stroke="#f7f3eb" stroke-width="1">
    <line x1="0" y1="900" x2="1920" y2="880"/>
    <line x1="0" y1="940" x2="1920" y2="920"/>
    <line x1="0" y1="980" x2="1920" y2="960"/>
