      <stop offset="0%" stop-color="#4a6b58"/>
      <stop offset="40%" stop-color="#2a4538"/>
      <stop offset="100%" stop-color="#3a3228"/>
    </linearGradient>
    <radialGradient id="hb-light" cx="70%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#faf6ee" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#2a4538" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#hb-sky)"/>
  <rect width="1920" height="1080" fill="url(#hb-light)"/>
  <path d="M0 720 Q480 620 960 680 T1920 640 L1920 1080 L0 1080 Z" fill="#2a4538" opacity="0.55"/>
  <path d="M0 820 Q640 740 1280 800 T1920 760 L1920 1080 L0 1080 Z" fill="#3a3228" opacity="0.7"/>
