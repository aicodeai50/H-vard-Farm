<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Sřndre Haugen gĺrd  original merkevare">
  <defs>
    <linearGradient id="shg-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a4538"/>
      <stop offset="50%" stop-color="#3d5c4a"/>
      <stop offset="100%" stop-color="#2a4538"/>
    </linearGradient>
    <linearGradient id="shg-cream" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#faf6ee"/>
      <stop offset="100%" stop-color="#e8e0d0"/>
    </linearGradient>
    <filter id="shg-soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <path id="shg-curve-top" d="M 55 198 A 145 145 0 0 1 345 198" fill="none"/>
    <path id="shg-curve-bot" d="M 75 318 A 125 125 0 0 0 325 318" fill="none"/>
  </defs>
  <!-- Outer seal ring  unique double-line crest -->
  <circle cx="200" cy="200" r="188" fill="url(#shg-cream)" stroke="url(#shg-ring)" stroke-width="3"/>
  <circle cx="200" cy="200" r="178" fill="none" stroke="#b8956a" stroke-width="1" opacity="0.65"/>
  <circle cx="200" cy="200" r="168" fill="none" stroke="#2a4538" stroke-width="0.75" opacity="0.35"/>

  <!-- Mřnepryd  original symmetric ridge (not copied clipart) -->
  <g fill="none" stroke="#2a4538" stroke-width="2.2" stroke-linecap="round" filter="url(#shg-soft)">
    <path d="M200 42 L200 58"/>
    <path d="M200 42 C185 52 172 62 160 72"/>
    <path d="M200 42 C215 52 228 62 240 72"/>
    <path d="M160 72 C175 68 188 64 200 62 C212 64 225 68 240 72"/>
    <path d="M172 58 L188 54 L212 54 L228 58"/>
    <circle cx="200" cy="48" r="4" fill="#b8956a" stroke="none"/>
  </g>

  <!-- Leaf wreath  8-fold, hand-balanced -->
  <g fill="#3d5c4a" opacity="0.85">
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(0 200 92)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(45 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(90 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(135 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(180 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(225 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(270 200 200)"/>
    <ellipse cx="200" cy="92" rx="12" ry="22" transform="rotate(315 200 200)"/>
  </g>

  <!-- Farm silhouette  stylized laft, unique proportions -->
  <g filter="url(#shg-soft)">
    <path d="M118 175 L142 155 L168 175 L168 230 L118 230 Z" fill="#8b3a3a" stroke="#3a3228" stroke-width="1.2"/>
    <path d="M168 168 L200 148 L232 168 L232 238 L168 238 Z" fill="#b8956a" stroke="#3a3228" stroke-width="1.2"/>
    <path d="M232 180 L258 162 L278 180 L278 225 L232 225 Z" fill="#8b3a3a" stroke="#3a3228" stroke-width="1.2"/>
    <rect x="186" y="200" width="28" height="38" rx="1" fill="#3a3228" opacity="0.5"/>
    <ellipse cx="200" cy="248" rx="95" ry="18" fill="#3d5c4a" opacity="0.25"/>
  </g>

  <!-- Heart + sprigs  brand signature -->
  <g transform="translate(200 268)">
    <path d="M0 8 C-14 -6 -28 -2 -14 12 C0 26 0 26 0 26 C0 26 0 26 14 12 C28 -2 14 -6 0 8 Z" fill="#8b3a3a" stroke="#3a3228" stroke-width="1"/>
    <path d="M-22 4 Q-28 -4 -18 -8" fill="none" stroke="#2a4538" stroke-width="1.5"/>
    <path d="M22 4 Q28 -4 18 -8" fill="none" stroke="#2a4538" stroke-width="1.5"/>
  </g>

  <!-- Wordmark on curves -->
  <text font-family="Georgia, 'Times New Roman', serif" font-size="22" font-weight="700" fill="#3a3228" letter-spacing="6">
    <textPath href="#shg-curve-top" startOffset="50%" text-anchor="middle">SŘNDRE HAUGEN</textPath>
  </text>
  <text font-family="Georgia, serif" font-size="34" font-style="italic" fill="#2a4538">
    <textPath href="#shg-curve-bot" startOffset="50%" text-anchor="middle">gĺrd</textPath>
  </text>
  <text x="200" y="352" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#5c4f3f" letter-spacing="3.5">EVENT · SELSKAP · BRYLLUP · FEST</text>
</svg>
