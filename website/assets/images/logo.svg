<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" role="img" aria-label="Sřndre Haugen gĺrd — original merkevare">
  <defs>
    <linearGradient id="lg-shield" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#f6efe4"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="lg-pine" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a3c34"/>
      <stop offset="100%" stop-color="#2d5a4f"/>
    </linearGradient>
    <linearGradient id="lg-copper" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a07a"/>
      <stop offset="100%" stop-color="#c17f59"/>
    </linearGradient>
    <clipPath id="lg-hex">
      <path d="M200 28 L338 108 L338 252 L200 332 L62 252 L62 108 Z"/>
    </clipPath>
  </defs>
  <!-- Original hex shield — not a standard circle seal -->
  <path d="M200 24 L344 108 L344 256 L200 340 L56 256 L56 108 Z" fill="url(#lg-shield)" stroke="url(#lg-pine)" stroke-width="3" stroke-linejoin="round"/>
  <path d="M200 36 L328 112 L328 248 L200 324 L72 248 L72 112 Z" fill="none" stroke="#c17f59" stroke-width="1.2" opacity="0.55"/>
  <g clip-path="url(#lg-hex)">
    <!-- Asymmetric hills — hand-tuned curves -->
    <path d="M40 280 Q120 220 200 250 Q280 220 360 280 L360 400 L40 400 Z" fill="#2d5a4f" opacity="0.35"/>
    <path d="M60 300 Q150 255 200 275 Q250 255 340 300 L340 400 L60 400 Z" fill="#1a3c34" opacity="0.5"/>
  </g>
  <!-- Original continuous-path knot monogram (SH + hill gate) -->
  <g fill="none" stroke="url(#lg-pine)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M200 95 C168 95 148 118 148 148 C148 168 162 182 182 188 C148 198 132 222 132 252 C132 286 160 310 200 310 C240 310 268 286 268 252 C268 222 252 198 218 188 C238 182 252 168 252 148 C252 118 232 95 200 95 Z"/>
    <path d="M200 118 L200 288" stroke-width="4" opacity="0.85"/>
    <path d="M158 168 C175 155 200 152 225 155 C242 158 248 172 238 182 C220 196 180 196 162 182 C152 172 158 168 158 168 Z" fill="#1a3c34" stroke="none"/>
  </g>
  <!-- Asymmetric mřne — 5 unequal spires (original proportions) -->
  <g stroke="#c17f59" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M200 72 L200 88"/>
    <path d="M200 72 L178 86"/>
    <path d="M200 72 L218 84"/>
    <path d="M200 72 L192 62"/>
    <path d="M200 72 L210 64"/>
    <circle cx="200" cy="68" r="5" fill="url(#lg-copper)" stroke="none"/>
  </g>
  <!-- Heart sprig — brand signature -->
  <g transform="translate(200 318)">
    <path d="M0 6 C-10 -5 -18 -2 -9 7 C0 16 0 16 0 16 C0 16 0 16 9 7 C18 -2 10 -5 0 6 Z" fill="#a64d3f"/>
    <path d="M-16 2 Q-20 -6 -12 -10" stroke="#2d5a4f" stroke-width="1.8" fill="none"/>
    <path d="M16 2 Q20 -6 12 -10" stroke="#2d5a4f" stroke-width="1.8" fill="none"/>
  </g>
  <!-- Copper ring accent -->
  <circle cx="200" cy="200" r="142" fill="none" stroke="url(#lg-copper)" stroke-width="0.8" opacity="0.4"/>
</svg>
